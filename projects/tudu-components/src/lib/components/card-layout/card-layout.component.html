<div
  class="service-card group rounded-2xl border border-slate-100 bg-white shadow-sm hover:shadow-md transition-all duration-300 relative mb-2 overflow-hidden"
>
  <div
    [class.force-show]="!hideHeader"
    class="flex items-center gap-3 p-3.5 border-b border-slate-50 bg-slate-50/30"
  >
    <div class="icon-style flex-shrink-0 flex items-center justify-center">
      <ng-content select="[service-icon]"></ng-content>
    </div>

    <div class="flex flex-col flex-1 min-w-0">
      <div class="flex items-center justify-between gap-2">
        <div
          class="truncate font-semibold text-slate-800 text-[15px] leading-tight"
        >
          <ng-content select="[service-title]"></ng-content>
        </div>
        <div class="flex-shrink-0 flex items-center gap-2">
          <!-- <ng-content select="[share-btn]"></ng-content> -->
          <ng-content select="[details-btn]"></ng-content>
        </div>
      </div>

      <div
        class="truncate text-[11px] font-medium text-slate-400 mt-0.5 tracking-wider"
      >
        <ng-content select="[service-address]"></ng-content>
      </div>
    </div>
  </div>

  <div class="p-4">
    <div *ngIf="cardTemplateIndicator === 1" class="mb-4">
      <div class="flex items-center justify-between mb-3">
        <div class="status-badge" [ngStyle]="badgeStyles">
          <ng-content select="[status-badge]"></ng-content>
        </div>
        <div
          class="text-xs text-gray-50 font-semibold px-2.5 py-1 rounded-full bg-gray-400/10 text-gray-500 flex items-center justify-center"
        >
          <ng-content select="[order-number]"></ng-content>
        </div>
      </div>

      <div class="flex flex-wrap gap-1.5 items-center">
        <ng-content select="[filter-tag]"></ng-content>
      </div>
    </div>

    <div
      class="text-xs font-semibold text-slate-600 mb-3"
      *ngIf="statusPedido === 'finalizado'"
    >
      <ng-content select="[conclusion-date]"></ng-content>
    </div>

    <div class="text-slate-700 text-sm">
      <ng-content select="[info-row]"></ng-content>
    </div>

    <div class="mt-7 font-bold text-emerald-600 text-base">
      <ng-content select="[price]"></ng-content>
    </div>

    <div
      *ngIf="!hideDescription"
      class="mt-3 p-3 bg-slate-50 border border-slate-100 rounded-xl"
    >
      <div class="text-slate-500 text-xs leading-relaxed italic">
        <ng-content select="[description]"></ng-content>
      </div>
    </div>
  </div>

  <div class="px-4 py-3 bg-slate-50/50 border-t border-slate-100">
    <div class="w-full">
      <ng-content select="[main-btn]"></ng-content>
    </div>
  </div>
</div>
