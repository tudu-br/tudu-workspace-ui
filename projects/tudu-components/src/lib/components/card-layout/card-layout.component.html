<div
  class="service-card group rounded-2xl border border-border-light bg-surface shadow-sm hover:shadow-md transition-all duration-300 relative mb-2 overflow-hidden dark:border-border-light"
>
  <div
    [class.force-show]="!hideHeader"
    class="flex items-center gap-3 p-3.5 border-b border-border-light bg-background/50"
    style="padding: 24px !important"
  >
    <div class="icon-style flex-shrink-0 flex items-center justify-center">
      <ng-content select="[service-icon]"></ng-content>
    </div>

    <div class="flex flex-col flex-1 min-w-0">
      <div class="flex items-center justify-between gap-2">
        <div
          class="truncate font-semibold text-text-primary text-[15px] leading-tight"
        >
          <ng-content select="[service-title]"></ng-content>
        </div>
        <div class="flex-shrink-0 flex items-center gap-2">
          <!-- <ng-content select="[share-btn]"></ng-content> -->
          <ng-content select="[details-btn]"></ng-content>
        </div>
      </div>

      <div
        class="truncate text-[11px] font-medium text-text-muted mt-0.5 tracking-wider"
      >
        <ng-content select="[service-address]"></ng-content>
      </div>
    </div>
  </div>

  <div class="p-4">
    <div *ngIf="cardTemplateIndicator === 1" class="mb-4">
      <div class="flex items-center justify-between mb-3">
        <div class="status-badge" [ngStyle]="badgeStyles">
          <ng-content select="[status-badge]"></ng-content>
        </div>
        <div
          class="text-xs font-semibold px-2.5 py-1 rounded-full bg-medium text-text-secondary flex items-center justify-center border border-border-light"
        >
          <ng-content select="[order-number]"></ng-content>
        </div>
      </div>

      <div class="flex flex-wrap gap-1.5 items-center">
        <ng-content select="[filter-tag]"></ng-content>
      </div>
    </div>

    <div
      class="text-xs font-semibold text-text-secondary mb-3"
      *ngIf="statusPedido === 'finalizado'"
    >
      <ng-content select="[conclusion-date]"></ng-content>
    </div>

    <div class="text-text-primary text-sm">
      <ng-content select="[info-row]"></ng-content>
    </div>

    <div class="mt-7 font-bold text-emerald-600 text-base">
      <ng-content select="[price]"></ng-content>
    </div>

    <div
      *ngIf="!hideDescription"
      class="mt-3 p-3 bg-background border border-border-light rounded-xl"
    >
      <div class="text-text-secondary text-xs leading-relaxed italic">
        <ng-content select="[description]"></ng-content>
      </div>
    </div>
  </div>

  <div class="px-4 py-3 bg-background/50 border-t border-border-light">
    <div class="w-full">
      <ng-content select="[main-btn]"></ng-content>
    </div>
  </div>
</div>
